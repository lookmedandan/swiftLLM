<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>AI Agent 聊天</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #header {
            background: #1976d2;
            color: white;
            padding: 15px 20px;
            font-size: 18px;
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .user {
            background: #1976d2;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot {
            background: white;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .loading { color: #999; font-style: italic; }
        #inputArea {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        #msgInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
        }
        #msgInput:focus { border-color: #1976d2; }
        button {
            padding: 12px 24px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-size: 15px;
        }
        button:hover { background: #1565c0; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div id="header">🤖 AI Agent 聊天</div>
    <div id="chat"></div>
    <div id="inputArea">
        <input type="text" id="msgInput" placeholder="输入消息，按回车发送..."
               onkeypress="if(event.key==='Enter')send()">
        <button id="sendBtn" onclick="send()">发送</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('msgInput');
        const btn = document.getElementById('sendBtn');

        function appendMsg(text, isUser) {
            const div = document.createElement('div');
            div.className = `msg ${isUser ? 'user' : 'bot'}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function send() {
            const text = input.value.trim();
            if (!text) return;

            appendMsg(text, true);
            input.value = '';
            btn.disabled = true;

            const loading = document.createElement('div');
            loading.className = 'msg bot loading';
            loading.id = 'loading';
            loading.textContent = '思考中...';
            chat.appendChild(loading);
            chat.scrollTop = chat.scrollHeight;

            try {
                const res = await fetch('http://localhost:8080/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                document.getElementById('loading').remove();
                appendMsg(data.response, false);
            } catch (err) {
                document.getElementById('loading').remove();
                appendMsg('错误: ' + err.message, false);
            } finally {
                btn.disabled = false;
                input.focus();
            }
        }
    </script>
</body>
</html>
