<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>AI Agent 流式聊天</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #header {
            background: #1976d2;
            color: white;
            padding: 15px 20px;
            font-size: 18px;
        }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .msg {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .user {
            background: #1976d2;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot {
            background: white;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            min-height: 20px;
        }
        .bot.streaming::after {
            content: '▋';
            animation: blink 1s infinite;
            color: #1976d2;
        }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

        #inputArea {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }
        #msgInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 15px;
            outline: none;
        }
        #msgInput:focus { border-color: #1976d2; }
        button {
            padding: 12px 24px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 24px;
            cursor: pointer;
        }
        button:hover { background: #1565c0; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .error { color: #d32f2f; }
    </style>
</head>
<body>
    <div id="header">🤖 AI Agent 流式聊天</div>
    <div id="chat"></div>
    <div id="inputArea">
        <input type="text" id="msgInput" placeholder="输入消息..."
               onkeypress="if(event.key==='Enter')send()">
        <button id="sendBtn" onclick="send()">发送</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('msgInput');
        const btn = document.getElementById('sendBtn');
        let currentEventSource = null;

        function appendMsg(text, isUser) {
            const div = document.createElement('div');
            div.className = `msg ${isUser ? 'user' : 'bot'}`;
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function send() {
            const text = input.value.trim();
            if (!text) return;
            if (btn.disabled) return; // 防止重复发送

            // 如果有正在进行的流，先关闭
            if (currentEventSource) {
                currentEventSource.close();
            }

            appendMsg(text, true);
            input.value = '';
            btn.disabled = true;

            // 创建 bot 消息框，带闪烁光标
            const botDiv = document.createElement('div');
            botDiv.className = 'msg bot streaming';
            chat.appendChild(botDiv);
            chat.scrollTop = chat.scrollHeight;

            let fullText = '';

            // GET 请求，EventSource 原生支持
            currentEventSource = new EventSource(
                `http://localhost:8080/chat/stream?message=${encodeURIComponent(text)}`
            );

            currentEventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.done) {
                    currentEventSource.close();
                    currentEventSource = null;
                    botDiv.classList.remove('streaming');
                    btn.disabled = false;
                    input.focus();
                } else if (data.token) {
                    fullText += data.token;
                    botDiv.textContent = fullText;
                    chat.scrollTop = chat.scrollHeight;
                }
            };

            currentEventSource.onerror = (err) => {
                console.error('SSE 错误:', err);
                currentEventSource.close();
                currentEventSource = null;
                botDiv.classList.remove('streaming');

                if (!fullText) {
                    botDiv.textContent = '连接错误，请检查后端服务';
                    botDiv.classList.add('error');
                }
                btn.disabled = false;
            };
        }
    </script>
</body>
</html>
