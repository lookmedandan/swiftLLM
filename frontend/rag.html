<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>RAG 知识库</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        input { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ddd; border-radius: 8px; }
        button { padding: 12px 24px; margin-top: 10px; background: #007aff; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .result { margin: 20px 0; padding: 15px; background: #f5f5f5; border-radius: 8px; }
        .score { color: #007aff; font-weight: bold; }
        .source { color: #666; font-size: 14px; }
        .content { margin-top: 8px; line-height: 1.6; }
    </style>
</head>
<body>
    <h1>📚 RAG 知识库查询</h1>
    <p>知识库共 <span id="total">?</span> 条文档</p>

    <input type="text" id="query" placeholder="输入查询，如：日本旅游推荐" onkeypress="if(event.key==='Enter')search()">
    <button onclick="search()">查询</button>

    <div id="results"></div>

    <script>
        const API = "http://localhost:8000";

        // 加载统计
        fetch(`${API}/stats`).then(r => r.json()).then(data => {
            document.getElementById('total').textContent = data.total_documents;
        });

        async function search() {
            const query = document.getElementById('query').value.trim();
            if (!query) return;

            document.getElementById('results').innerHTML = '<p>查询中...</p>';

            const res = await fetch(`${API}/search`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({query, top_k: 3})
            });

            const data = await res.json();
            const html = data.results.map(r => `
                <div class="result">
                    <div class="score">相似度: ${r.score.toFixed(4)}</div>
                    <div class="source">来源: ${r.source}</div>
                    <div class="content">${r.content.substring(0, 200)}...</div>
                </div>
            `).join('');

            document.getElementById('results').innerHTML =
                html || '<p>未找到相关知识</p>';
        }
    </script>
</body>
</html>
