<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>AI Agent - RAG 智能客服</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown-light.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        #header h2 { font-size: 18px; font-weight: 500; }
        #header-right { display: flex; gap: 10px; align-items: center; }

        .btn {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .btn:hover { background: rgba(255,255,255,0.3); }
        .btn.primary { background: white; color: #667eea; }
        .btn.danger { background: rgba(244,67,54,0.8); }
        .btn.danger:hover { background: rgba(244,67,54,1); }
        .btn.warning { background: rgba(255,152,0,0.8); }
        .btn.warning:hover { background: rgba(255,152,0,1); }

        #main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ========== 左侧对话列表 ========== */
        #conv-sidebar {
            width: 260px;
            background: rgba(255,255,255,0.95);
            margin: 10px 0 10px 10px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }
        #conv-sidebar-header {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #conv-sidebar-header h3 {
            font-size: 14px;
            font-weight: 600;
        }
        #conv-new-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        #conv-new-btn:hover { background: #5a6fd6; transform: scale(1.1); }
        #conv-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        .conv-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: 0.2s;
            font-size: 13px;
            position: relative;
            group: true;
        }
        .conv-item:hover { background: #f0f7ff; }
        .conv-item:hover .conv-actions { opacity: 1; }
        .conv-item.active { background: #e3f2fd; color: #1976d2; }
        .conv-item.active .conv-actions { opacity: 1; }
        .conv-item-title {
            font-weight: 500;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 50px;
        }
        .conv-item-meta {
            font-size: 11px;
            color: #999;
            display: flex;
            justify-content: space-between;
        }
        .conv-actions {
            position: absolute;
            top: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: 0.2s;
        }
        .conv-action-btn {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            border: none;
            background: rgba(0,0,0,0.05);
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
        }
        .conv-action-btn:hover { background: rgba(0,0,0,0.1); }
        .conv-action-btn.delete:hover { background: #ffebee; color: #f44336; }
        .conv-action-btn.rename:hover { background: #e3f2fd; color: #1976d2; }

        /* ========== 中间聊天区域 ========== */
        #chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin: 10px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }
        #chat-header {
            padding: 12px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        #chat-title-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        #chat-title {
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: 0.2s;
        }
        #chat-title:hover { background: #f0f7ff; }
        #chat-title-input {
            font-weight: 600;
            font-size: 15px;
            padding: 4px 8px;
            border: 2px solid #667eea;
            border-radius: 6px;
            outline: none;
            display: none;
        }
        #chat-actions {
            display: flex;
            gap: 8px;
        }
        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #fafbfc;
        }
        .msg {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 18px;
            line-height: 1.6;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg.user {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .msg.bot {
            background: white;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 0;
        }
        .bot-content { padding: 14px 18px; }
        .bot .markdown-body {
            font-size: 14px;
            line-height: 1.7;
            color: #333;
        }
        .bot .markdown-body h1, .bot .markdown-body h2, .bot .markdown-body h3 {
            margin-top: 16px;
            margin-bottom: 10px;
            color: #1a1a1a;
            border-bottom: 1px solid #eee;
            padding-bottom: 6px;
        }
        .bot .markdown-body pre {
            background: #f6f8fa;
            border-radius: 8px;
            padding: 14px;
            overflow-x: auto;
            margin: 10px 0;
            border: 1px solid #e1e4e8;
        }
        .bot .markdown-body code {
            background: rgba(175, 184, 193, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 13px;
        }
        .bot .markdown-body pre code { background: none; padding: 0; }
        .bot .markdown-body blockquote {
            border-left: 4px solid #667eea;
            padding-left: 14px;
            margin: 10px 0;
            color: #586069;
            background: #f6f8fa;
            padding: 10px 14px;
            border-radius: 0 8px 8px 0;
        }
        .bot .markdown-body table {
            border-collapse: collapse;
            margin: 10px 0;
            width: 100%;
        }
        .bot .markdown-body th, .bot .markdown-body td {
            border: 1px solid #d0d7de;
            padding: 8px 12px;
            text-align: left;
        }
        .bot .markdown-body th { background: #f6f8fa; font-weight: 600; }
        .bot .markdown-body tr:nth-child(even) { background: #f6f8fa; }
        .sources {
            margin: 0;
            padding: 12px 18px;
            background: #f0f7ff;
            border-top: 1px solid #dbeafe;
            font-size: 12px;
            color: #1e40af;
        }
        .source-item {
            margin: 4px 0;
            padding: 4px 0;
            border-bottom: 1px dashed #bfdbfe;
            line-height: 1.5;
        }
        .source-item:last-child { border-bottom: none; }
        .score { color: #059669; font-weight: 600; }
        .source-type {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 4px;
            background: #dbeafe;
            color: #1e40af;
        }
        .log-link {
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
            font-size: 11px;
        }
        #chat-input-area {
            display: flex;
            gap: 10px;
            padding: 15px 20px;
            border-top: 1px solid #eee;
            flex-shrink: 0;
        }
        #msgInput {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid #e9ecef;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
        }
        #msgInput:focus { border-color: #667eea; }

        /* ========== 右侧信息栏 ========== */
        #info-sidebar {
            width: 260px;
            background: rgba(255,255,255,0.95);
            margin: 10px 10px 10px 0;
            border-radius: 12px;
            padding: 15px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        #info-sidebar h3 {
            font-size: 14px;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 13px;
            border-bottom: 1px solid #f0f0f0;
        }
        .upload-area {
            margin-top: 15px;
            padding: 15px;
            border: 2px dashed #ddd;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
        }
        .upload-area:hover { border-color: #667eea; background: #f0f7ff; }
        .upload-area input { display: none; }

        /* ========== 弹窗 ========== */
        #log-modal, #confirm-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        #log-modal.active, #confirm-modal.active { display: flex; }
        #log-modal-content, #confirm-modal-content {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #log-modal-content {
            width: 90%;
            max-width: 900px;
            max-height: 80vh;
        }
        #confirm-modal-content {
            width: 400px;
            padding: 24px;
        }
        #log-modal-header, #confirm-modal-header {
            padding: 20px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #confirm-modal-header { border-bottom: none; padding: 0 0 16px 0; }
        #confirm-modal-header h3 { font-size: 18px; color: #333; }
        #confirm-modal-body {
            padding: 0 0 20px 0;
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        #confirm-modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        #log-modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .log-stage { margin-bottom: 24px; }
        .log-stage-title {
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
            padding: 6px 12px;
            background: #f0f7ff;
            border-radius: 6px;
            display: inline-block;
        }
        .log-stage-item {
            padding: 10px 14px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .log-stage-score {
            color: #059669;
            font-weight: 600;
            float: right;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #999;
            cursor: pointer;
            padding: 0;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .close-btn:hover { background: #f5f5f5; color: #333; }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .empty-state-text {
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* 加载动画 */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 14px 18px;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div id="header">
        <h2>🤖 AI Agent - RAG 智能客服</h2>
        <div id="header-right">
            <button class="btn" onclick="showLogs()">📊 检索日志</button>
        </div>
    </div>

    <div id="main">
        <!-- 左侧：对话列表 -->
        <div id="conv-sidebar">
            <div id="conv-sidebar-header">
                <h3>💬 对话历史</h3>
                <button id="conv-new-btn" onclick="newConversation()" title="新建对话">+</button>
            </div>
            <div id="conv-list"></div>
        </div>

        <!-- 中间：聊天区域 -->
        <div id="chat-area">
            <div id="chat-header">
                <div id="chat-title-wrap">
                    <span id="chat-title" onclick="startRename()">新对话</span>
                    <input id="chat-title-input" type="text" onblur="finishRename()" onkeypress="if(event.key==='Enter')finishRename()">
                </div>
                <div id="chat-actions">
                    <button class="btn warning" onclick="clearCurrentConversation()" title="清空当前对话">🗑️ 清空</button>
                    <button class="btn danger" onclick="deleteCurrentConversation()" title="删除当前对话">🗑️ 删除</button>
                </div>
            </div>
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="msgInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter')send()">
                <button class="btn primary" onclick="send()">发送</button>
            </div>
        </div>

        <!-- 右侧：知识库信息 -->
        <div id="info-sidebar">
            <h3>📊 知识库状态</h3>
            <div class="stat-item">
                <span>文档总数</span>
                <span id="docCount" style="color:#667eea;font-weight:600;">-</span>
            </div>
            <div class="stat-item">
                <span>状态</span>
                <span id="ragStatus" style="color:#4CAF50;">加载中...</span>
            </div>

            <h3 style="margin-top:20px;">📁 上传文档</h3>
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept=".txt,.md,.pdf,.docx" onchange="uploadFile(this)">
                <p>📎 点击上传</p>
                <p style="font-size:11px;color:#999;">支持 txt, md, pdf, docx</p>
            </div>

            <h3 style="margin-top:20px;">⚡ 快捷操作</h3>
            <button class="btn" style="width:100%;margin-top:8px;" onclick="newConversation()">+ 新建对话</button>
            <button class="btn warning" style="width:100%;margin-top:8px;" onclick="clearAllConversations()">🗑️ 清空所有对话</button>
        </div>
    </div>

    <!-- 检索日志弹窗 -->
    <div id="log-modal">
        <div id="log-modal-content">
            <div id="log-modal-header">
                <h3>🔍 检索详情</h3>
                <button class="close-btn" onclick="closeLogModal()">×</button>
            </div>
            <div id="log-modal-body"></div>
        </div>
    </div>

    <!-- 确认弹窗 -->
    <div id="confirm-modal">
        <div id="confirm-modal-content">
            <div id="confirm-modal-header">
                <h3 id="confirm-title">确认操作</h3>
            </div>
            <div id="confirm-modal-body">
                <p id="confirm-message">确定要执行此操作吗？</p>
            </div>
            <div id="confirm-modal-footer">
                <button class="btn" onclick="closeConfirmModal()">取消</button>
                <button class="btn danger" id="confirm-btn" onclick="">确认</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 配置 ==========
        marked.setOptions({
            breaks: true, gfm: true, headerIds: false,
            highlight: function(code, lang) {
                if (lang && hljs.getLanguage(lang)) {
                    try { return hljs.highlight(code, { language: lang }).value; } catch (e) {}
                }
                return hljs.highlightAuto(code).value;
            }
        });

        const API_BASE = 'http://localhost:8080';
        let currentConvId = null;
        let isRenaming = false;
        const chatMessages = document.getElementById('chat-messages');

        // ========== 初始化 ==========
        async function init() {
            await loadConversations();
            await loadStats();
            if (!currentConvId) {
                await newConversation();
            }
        }

        // ========== 对话列表管理 ==========
        async function loadConversations() {
            try {
                const res = await fetch(`${API_BASE}/conversations`);
                const data = await res.json();
                const list = document.getElementById('conv-list');
                list.innerHTML = '';

                if (data.conversations.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">💬</div>
                            <div class="empty-state-text">暂无对话</div>
                            <button class="btn primary" onclick="newConversation()">开始新对话</button>
                        </div>
                    `;
                    return;
                }

                data.conversations.forEach(conv => {
                    const div = document.createElement('div');
                    div.className = `conv-item ${conv.id === currentConvId ? 'active' : ''}`;
                    const time = new Date(conv.updated_at).toLocaleDateString('zh-CN');
                    const isActive = conv.id === currentConvId;

                    div.innerHTML = `
                        <div class="conv-item-title" title="${conv.title}">${conv.title}</div>
                        <div class="conv-item-meta">
                            <span>${time}</span>
                            <span>${conv.message_count} 条消息</span>
                        </div>
                        <div class="conv-actions">
                            <button class="conv-action-btn rename" onclick="event.stopPropagation(); renameConversation('${conv.id}', '${conv.title}')" title="重命名">✏️</button>
                            <button class="conv-action-btn delete" onclick="event.stopPropagation(); confirmDelete('${conv.id}', '${conv.title}')" title="删除">🗑️</button>
                        </div>
                    `;
                    div.onclick = () => switchConversation(conv.id);
                    list.appendChild(div);
                });
            } catch (e) {
                console.error('加载对话失败', e);
                document.getElementById('conv-list').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div class="empty-state-text">加载失败，请检查服务是否运行</div>
                    </div>
                `;
            }
        }

        // ========== 新建对话 ==========
        async function newConversation() {
            try {
                const res = await fetch(`${API_BASE}/conversations`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({title: '新对话'})
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const data = await res.json();
                currentConvId = data.id;
                document.getElementById('chat-title').textContent = data.title;
                document.getElementById('chat-title-input').value = data.title;
                chatMessages.innerHTML = '';
                await loadConversations();
                console.log('新对话创建成功:', data.id);
            } catch (e) {
                console.error('创建对话失败:', e);
                alert('创建对话失败: ' + e.message);
            }
        }

        // ========== 切换对话 ==========
        async function switchConversation(convId) {
            if (convId === currentConvId) return;
            try {
                const res = await fetch(`${API_BASE}/conversations/${convId}`);
                const conv = await res.json();
                currentConvId = convId;
                document.getElementById('chat-title').textContent = conv.title;
                document.getElementById('chat-title-input').value = conv.title;

                chatMessages.innerHTML = '';
                if (conv.messages.length === 0) {
                    showEmptyChat();
                } else {
                    conv.messages.forEach(msg => {
                        if (msg.role === 'user') {
                            appendMessage(msg.content, true);
                        } else {
                            appendMessage(msg.content, false, msg.sources, msg.log_id);
                        }
                    });
                }

                await loadConversations();
            } catch (e) {
                alert('切换对话失败: ' + e.message);
            }
        }

        // ========== 重命名对话 ==========
        function startRename() {
            if (!currentConvId) return;
            const titleEl = document.getElementById('chat-title');
            const inputEl = document.getElementById('chat-title-input');
            inputEl.value = titleEl.textContent;
            titleEl.style.display = 'none';
            inputEl.style.display = 'block';
            inputEl.focus();
            inputEl.select();
            isRenaming = true;
        }

        async function finishRename() {
            if (!isRenaming) return;
            const titleEl = document.getElementById('chat-title');
            const inputEl = document.getElementById('chat-title-input');
            const newTitle = inputEl.value.trim();

            titleEl.style.display = 'block';
            inputEl.style.display = 'none';
            isRenaming = false;

            if (!newTitle || newTitle === titleEl.textContent) return;

            try {
                const res = await fetch(`${API_BASE}/conversations/${currentConvId}/title`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({title: newTitle})
                });
                if (!res.ok) throw new Error('重命名失败');
                titleEl.textContent = newTitle;
                await loadConversations();
            } catch (e) {
                alert('重命名失败: ' + e.message);
            }
        }

        async function renameConversation(convId, currentTitle) {
            const newTitle = prompt('请输入新标题:', currentTitle);
            if (!newTitle || newTitle === currentTitle) return;

            try {
                const res = await fetch(`${API_BASE}/conversations/${convId}/title`, {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({title: newTitle})
                });
                if (!res.ok) throw new Error('重命名失败');
                await loadConversations();
                if (convId === currentConvId) {
                    document.getElementById('chat-title').textContent = newTitle;
                    document.getElementById('chat-title-input').value = newTitle;
                }
            } catch (e) {
                alert('重命名失败: ' + e.message);
            }
        }

        // ========== 删除对话 ==========
        function confirmDelete(convId, title) {
            showConfirm(
                '删除对话',
                `确定要删除对话 "${title}" 吗？此操作不可恢复。`,
                () => deleteConversation(convId)
            );
        }

        async function deleteConversation(convId) {
            closeConfirmModal();
            try {
                const res = await fetch(`${API_BASE}/conversations/${convId}`, { method: 'DELETE' });
                if (!res.ok) throw new Error('删除失败');

                if (convId === currentConvId) {
                    currentConvId = null;
                    chatMessages.innerHTML = '';
                    document.getElementById('chat-title').textContent = '新对话';
                    // 自动切换到第一个对话或创建新对话
                    const remaining = await loadConversations();
                    const firstConv = document.querySelector('.conv-item');
                    if (firstConv) {
                        firstConv.click();
                    } else {
                        await newConversation();
                    }
                } else {
                    await loadConversations();
                }
            } catch (e) {
                alert('删除失败: ' + e.message);
            }
        }

        function deleteCurrentConversation() {
            if (!currentConvId) return;
            const title = document.getElementById('chat-title').textContent;
            confirmDelete(currentConvId, title);
        }

        // ========== 清空对话 ==========
        function clearCurrentConversation() {
            if (!currentConvId) return;
            showConfirm(
                '清空对话',
                '确定要清空当前对话的所有消息吗？此操作不可恢复。',
                () => doClearCurrentConversation()
            );
        }

        async function doClearCurrentConversation() {
            closeConfirmModal();
            try {
                // 后端没有单独的清空接口，通过删除后重建实现
                const title = document.getElementById('chat-title').textContent;
                await fetch(`${API_BASE}/conversations/${currentConvId}`, { method: 'DELETE' });

                const res = await fetch(`${API_BASE}/conversations`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({title: title})
                });
                const data = await res.json();
                currentConvId = data.id;
                chatMessages.innerHTML = '';
                await loadConversations();
            } catch (e) {
                alert('清空失败: ' + e.message);
            }
        }

        async function clearAllConversations() {
            showConfirm(
                '清空所有对话',
                '确定要删除所有对话吗？此操作不可恢复。',
                () => doClearAllConversations()
            );
        }

        async function doClearAllConversations() {
            closeConfirmModal();
            try {
                const res = await fetch(`${API_BASE}/conversations`);
                const data = await res.json();
                for (const conv of data.conversations) {
                    await fetch(`${API_BASE}/conversations/${conv.id}`, { method: 'DELETE' });
                }
                currentConvId = null;
                chatMessages.innerHTML = '';
                await loadConversations();
                await newConversation();
            } catch (e) {
                alert('清空失败: ' + e.message);
            }
        }

        // ========== 消息渲染 ==========
        function showEmptyChat() {
            chatMessages.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">🤖</div>
                    <div class="empty-state-text">开始一个新的对话吧</div>
                </div>
            `;
        }

        function appendMessage(text, isUser, sources, logId) {
            const emptyState = chatMessages.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const div = document.createElement('div');
            div.className = `msg ${isUser ? 'user' : 'bot'}`;

            if (isUser) {
                div.textContent = text;
            } else {
                const contentDiv = document.createElement('div');
                contentDiv.className = 'bot-content';
                const mdDiv = document.createElement('div');
                mdDiv.className = 'markdown-body';
                mdDiv.innerHTML = marked.parse(text);
                contentDiv.appendChild(mdDiv);
                div.appendChild(contentDiv);

                if (sources && sources.length > 0) {
                    const sourcesDiv = document.createElement('div');
                    sourcesDiv.className = 'sources';
                    let html = '<b>📚 参考来源：</b>';
                    sources.forEach(s => {
                        html += `<div class="source-item">
                            <span class="source-type">本地</span>
                            ${s.content.substring(0, 80)}...
                            <span class="score">(${s.score})</span>
                        </div>`;
                    });
                    if (logId) {
                        html += `<div style="margin-top:6px;"><span class="log-link" onclick="showLogDetail('${logId}')">🔍 查看检索过程</span></div>`;
                    }
                    sourcesDiv.innerHTML = html;
                    div.appendChild(sourcesDiv);
                }

                setTimeout(() => {
                    div.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
                }, 10);
            }

            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // ========== 发送消息 ==========
        function send() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            appendMessage(text, true);

            const botDiv = document.createElement('div');
            botDiv.className = 'msg bot streaming';
            botDiv.innerHTML = `
                <div class="bot-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatMessages.appendChild(botDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            let fullText = '';
            let sources = [];
            let logId = null;

            const eventSource = new EventSource(
                `${API_BASE}/chat/stream?message=${encodeURIComponent(text)}&conv_id=${currentConvId}&use_rag=true`
            );

            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.conv_id) currentConvId = data.conv_id;

                if (data.sources) {
                    sources = data.sources;
                    logId = data.log_id;
                }

                if (data.done) {
                    eventSource.close();
                    botDiv.remove();
                    appendMessage(fullText, false, sources, logId);
                    loadConversations();
                } else if (data.token) {
                    if (fullText === '') {
                        botDiv.querySelector('.bot-content').innerHTML = '<div class="markdown-body"></div>';
                    }
                    fullText += data.token;
                    botDiv.querySelector('.markdown-body').innerHTML = marked.parse(fullText);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            };

            eventSource.onerror = () => {
                eventSource.close();
                botDiv.remove();
                appendMessage('❌ 连接错误，请检查服务是否运行', false);
            };
        }

        // ========== 检索日志 ==========
        async function showLogDetail(logId) {
            try {
                const res = await fetch(`${API_BASE}/conversations/${currentConvId}/log/${logId}`);
                const log = await res.json();

                const body = document.getElementById('log-modal-body');
                body.innerHTML = `
                    <div style="margin-bottom:16px;padding:10px 14px;background:#f0f7ff;border-radius:8px;font-size:13px;">
                        <b>查询：</b>${log.query}<br>
                        <b>耗时：</b>${log.duration_ms}ms
                    </div>
                    <div class="log-stage">
                        <div class="log-stage-title">1️⃣ 向量检索结果（Top 5）</div>
                        ${log.vector_results.map(r => `
                            <div class="log-stage-item">
                                <span class="log-stage-score">score: ${r.score}</span>
                                <div>doc_id: ${r.doc_id}</div>
                                <div style="color:#666;margin-top:4px;">${r.content}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="log-stage">
                        <div class="log-stage-title">2️⃣ 关键词检索结果（Top 5）</div>
                        ${log.keyword_results.map(r => `
                            <div class="log-stage-item">
                                <span class="log-stage-score">score: ${r.score}</span>
                                <div>doc_id: ${r.doc_id}</div>
                                <div style="color:#666;margin-top:4px;">${r.content}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="log-stage">
                        <div class="log-stage-title">3️⃣ RRF 融合排序</div>
                        ${log.fused_results.map(r => `
                            <div class="log-stage-item">
                                <span class="log-stage-score">rrf: ${r.rrf_score}</span>
                                <div>doc_id: ${r.doc_id}</div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="log-stage">
                        <div class="log-stage-title">4️⃣ 重排序后最终结果</div>
                        ${log.final_results.map((r, i) => `
                            <div class="log-stage-item">
                                <span class="log-stage-score">rank: ${i+1} | score: ${r.score}</span>
                                <div>来源: ${r.source}</div>
                                <div style="color:#666;margin-top:4px;">${r.content.substring(0, 200)}...</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                document.getElementById('log-modal').classList.add('active');
            } catch (e) {
                alert('加载日志详情失败: ' + e.message);
            }
        }

        function closeLogModal() {
            document.getElementById('log-modal').classList.remove('active');
        }

        async function showLogs() {
            if (!currentConvId) return;
            try {
                const res = await fetch(`${API_BASE}/conversations/${currentConvId}/logs`);
                const data = await res.json();
                if (data.logs.length === 0) {
                    alert('本对话暂无检索日志');
                    return;
                }
                alert(`本对话共有 ${data.logs.length} 条检索日志`);
            } catch (e) {
                alert('加载日志失败: ' + e.message);
            }
        }

        // ========== 知识库状态 ==========
        async function loadStats() {
            try {
                const res = await fetch(`${API_BASE}/rag/stats`);
                const data = await res.json();
                document.getElementById('docCount').textContent = data.total_documents || data.total || '-';
                document.getElementById('ragStatus').textContent = '就绪';
                document.getElementById('ragStatus').style.color = '#4CAF50';
            } catch (e) {
                document.getElementById('ragStatus').textContent = '未连接';
                document.getElementById('ragStatus').style.color = '#f44336';
            }
        }

        // ========== 文件上传 ==========
        async function uploadFile(input) {
            const file = input.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch(`${API_BASE}/rag/upload`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                alert(`✅ ${data.message}`);
                await loadStats();
            } catch (e) {
                alert('❌ 上传失败: ' + e.message);
            }
            input.value = '';
        }

        // ========== 通用确认弹窗 ==========
        let confirmCallback = null;

        function showConfirm(title, message, onConfirm) {
            document.getElementById('confirm-title').textContent = title;
            document.getElementById('confirm-message').textContent = message;
            confirmCallback = onConfirm;
            document.getElementById('confirm-btn').onclick = () => {
                if (confirmCallback) confirmCallback();
            };
            document.getElementById('confirm-modal').classList.add('active');
        }

        function closeConfirmModal() {
            document.getElementById('confirm-modal').classList.remove('active');
            confirmCallback = null;
        }

        // 点击弹窗背景关闭
        document.getElementById('log-modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeLogModal();
        });
        document.getElementById('confirm-modal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeConfirmModal();
        });

        // ========== 启动 ==========
        init();
    </script>
</body>
</html>
